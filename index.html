<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">

    <!-- DaisyUI -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.css" rel="stylesheet" />

</head>


<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="card w-96 bg-base-100 shadow-xl ">

        <div class="card-body items-center justify-center ">
            <div class="items-end">
                <img src="./assets/github-logo.png" alt="">
            </div>
            <h1 class="text-2xl font-bold text-center">
                GitHub Issues Tracker
            </h1>

            <p class="text-center text-gray-500">
                Sign in to manage your issues
            </p>

            <input id="username" type="text" placeholder="Enter Username" class="input input-bordered w-full" />

            <input id="password" type="password" placeholder="Enter Password" class="input input-bordered w-full" />

            <button onclick="login()" class="btn btn-primary w-full">
                Sign In
            </button>

            <div class="text-sm text-center mt-3 text-gray-500">
                <p>Username: admin</p>
                <p>Password: admin123</p>

            </div>

        </div>
    </div>

    

</body>

</html>
